<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      padding: 16px;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    input, textarea {
      box-sizing: border-box;
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    textarea {
      height: 80px;
      resize: vertical;
    }
    .field {
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #3367d6;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #4caf50;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <h3>状态刷新</h3>
  <div class="field">
    <label>目标关键词（每行一个）</label>
    <textarea id="targets" placeholder="douyin.com&#10;抖音"></textarea>
  </div>
  <div class="field">
    <label>限时时间（秒）</label>
    <input id="limitSeconds" type="number" min="1" value="300">
  </div>
  <button id="save">保存配置</button>
  <div class="status" id="status">已保存</div>
  <script src="popup.js"></script>
</body>
</html>
